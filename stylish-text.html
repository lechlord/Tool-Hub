<!DOCTYPE html>
<html>
<head>
<title>Stylish Text Generator</title>

<style>
body {
  font-family: 'Segoe UI';
  background: #eef2f7;
  text-align: center;
}

.container {
  margin: 60px auto;
  background: white;
  padding: 25px;
  border-radius: 15px;
  width: 380px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.output-box {
  background: #f1f5f9;
  padding: 10px;
  border-radius: 10px;
  margin: 8px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  word-break: break-all;
}

.copy-btn {
  background: #3b82f6;
  color: white;
  border: none;
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="container">
  <h2>Stylish Text Generator вңЁ</h2>

  <input type="text" id="input" placeholder="Enter text..." oninput="convert()">

  <div id="results"></div>
</div>

<script>
function convert(){
  let text = document.getElementById("input").value;
  let results = document.getElementById("results");
  results.innerHTML = "";

  const styles = [
    t => t.toUpperCase(),
    t => t.toLowerCase(),
    t => t.split("").join(" "),
    t => t.replace(/a/g,"@").replace(/s/g,"$"),

    t => t.split("").map(c => 
      "рқ“Әрқ“«рқ“¬рқ“ӯрқ“®рқ“Ҝрқ“°рқ“ұрқ“Ірқ“ірқ“ҙрқ“өрқ“¶рқ“·рқ“ёрқ“№рқ“әрқ“»рқ“јрқ“Ҫрқ“ҫрқ“ҝрқ”Җрқ”Ғрқ”Ӯрқ”ғ"["abcdefghijklmnopqrstuvwxyz".indexOf(c.toLowerCase())] || c
    ).join(""),

    t => t.split("").map(c => 
      "рқ”һрқ”ҹрқ” рқ”Ўрқ”ўрқ”Јрқ”Өрқ”Ҙрқ”Ұрқ”§рқ”Ёрқ”©рқ”Әрқ”«рқ”¬рқ”ӯрқ”®рқ”Ҝрқ”°рқ”ұрқ”Ірқ”ірқ”ҙрқ”өрқ”¶рқ”·"["abcdefghijklmnopqrstuvwxyz".indexOf(c.toLowerCase())] || c
    ).join(""),

    t => t.split("").map(c => 
      "рҹ…җрҹ…‘рҹ…’рҹ…“рҹ…”рҹ…•рҹ…–рҹ…—рҹ…ҳрҹ…ҷрҹ…ҡрҹ…ӣрҹ…ңрҹ…қрҹ…һрҹ…ҹрҹ… рҹ…Ўрҹ…ўрҹ…Јрҹ…Өрҹ…Ҙрҹ…Ұрҹ…§рҹ…Ёрҹ…©"["abcdefghijklmnopqrstuvwxyz".indexOf(c.toLowerCase())] || c
    ).join(""),

    t => t.split("").map(c => 
      "в“җв“‘в“’в““в“”в“•в“–в“—в“ҳв“ҷв“ҡв“ӣв“ңв“қв“һв“ҹв“ в“Ўв“ўв“Јв“Өв“Ҙв“Ұв“§в“Ёв“©"["abcdefghijklmnopqrstuvwxyz".indexOf(c.toLowerCase())] || c
    ).join(""),

    t => t.split("").map(c => 
      "ОұРІcвҲӮС”Ж’gРҪО№Ч Рәв„“РјРҪПғПҒqСҸС•СӮП…ОҪПүПҮСғz"["abcdefghijklmnopqrstuvwxyz".indexOf(c.toLowerCase())] || c
    ).join(""),

    t => t.split("").map(c => 
      "еҚӮд№ғеҢҡб—Әд№ҮеҚғбҺ¶еҚ„дёЁпҫҢТңг„ҘзҲӘеҮ г„–еҚ©ЙҠе°әдёӮг„’г„©бҗҜеұұд№Ӯг„ҡд№ҷ"["abcdefghijklmnopqrstuvwxyz".indexOf(c.toLowerCase())] || c
    ).join("")
  ];

  styles.forEach(style => {
    let styledText = style(text);

    let box = document.createElement("div");
    box.className = "output-box";

    let span = document.createElement("span");
    span.innerText = styledText;

    let btn = document.createElement("button");
    btn.innerText = "Copy";
    btn.className = "copy-btn";
    btn.onclick = () => {
      navigator.clipboard.writeText(styledText);
      btn.innerText = "Copied!";
      setTimeout(() => btn.innerText = "Copy", 1000);
    };

    box.appendChild(span);
    box.appendChild(btn);
    results.appendChild(box);
  });
}
</script>

</body>
</html>
