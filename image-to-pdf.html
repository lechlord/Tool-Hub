<!DOCTYPE html>
<html>
<head>
<title>Image to PDF</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body {font-family:Segoe UI;background:#eef2f7;text-align:center;}
.container {margin:80px auto; background:white; padding:30px; border-radius:15px; width:350px;}
button {padding:10px 15px; background:#3b82f6; color:white; border:none; border-radius:8px;}
</style>
</head>

<body>

<div class="container">
<h2>Image → PDF</h2>
<input type="file" id="upload"><br><br>
<button onclick="convert()">Convert</button>
</div>

<script>
function convert(){
const { jsPDF } = window.jspdf;
let file=document.getElementById("upload").files[0];
let img=new Image();
img.src=URL.createObjectURL(file);

img.onload=function(){
let pdf=new jsPDF();
pdf.addImage(img,'JPEG',10,10,180,160);
pdf.save("file.pdf");
}
}
</script>

</body>
</html>
