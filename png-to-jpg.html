<!DOCTYPE html>
<html>
<head>
<title>PNG to JPG</title>
<style>
body {font-family:Segoe UI;background:#eef2f7;text-align:center;}
.container {margin:80px auto; background:white; padding:30px; border-radius:15px; width:350px; box-shadow:0 5px 15px rgba(0,0,0,0.1);}
button {padding:10px 15px; border:none; border-radius:8px; background:#3b82f6; color:white;}
</style>
</head>

<body>

<div class="container">
<h2>PNG → JPG</h2>
<input type="file" id="upload"><br><br>
<button onclick="convert()">Convert</button><br><br>
<a id="download" style="display:none;"><button>Download</button></a>
</div>

<script>
function convert(){
let file=document.getElementById("upload").files[0];
let img=new Image();
img.src=URL.createObjectURL(file);

img.onload=function(){
let c=document.createElement("canvas");
c.width=img.width; c.height=img.height;
let ctx=c.getContext("2d");
ctx.fillStyle="white";
ctx.fillRect(0,0,c.width,c.height);
ctx.drawImage(img,0,0);

let link=document.getElementById("download");
link.href=c.toDataURL("image/jpeg");
link.download="image.jpg";
link.style.display="block";
}
}
</script>

</body>
</html>
