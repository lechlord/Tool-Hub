<!DOCTYPE html>
<html>
<head>
<title>Password Generator</title>

<style>
body {
  font-family:Segoe UI;
  background:#eef2f7;
  text-align:center;
}

.container {
  margin:80px auto;
  background:white;
  padding:30px;
  border-radius:15px;
  width:350px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
  margin-top:10px;
}

input {
  padding:8px;
  width:80px;
  margin:10px;
}

.output {
  margin-top:15px;
  word-break:break-all;
  background:#f1f5f9;
  padding:10px;
  border-radius:8px;
}

.strength {
  height:10px;
  border-radius:5px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
<h2>Password Generator 🔐</h2>
<h4>(Max length 32)</h4>

<label>Length:</label>
<input type="number" id="length" value="12"><br>

<button onclick="generate()">Generate</button>

<div id="output" class="output"></div>

<button onclick="copy()">Copy Password</button>

<div id="strengthBar" class="strength"></div>

</div>

<script>
function generate(){
let length = Math.min(document.getElementById("length").value, 32);
let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*";
let password = "";

for(let i=0;i<length;i++){
  password += chars.charAt(Math.floor(Math.random()*chars.length));
}

document.getElementById("output").innerText = password;
checkStrength(password);
}

function copy(){
let text = document.getElementById("output").innerText;

navigator.clipboard.writeText(text);
alert("Copied!");
}

function checkStrength(pw){
let strength = 0;

if(pw.length >= 8) strength++;
if(/[A-Z]/.test(pw)) strength++;
if(/[0-9]/.test(pw)) strength++;
if(/[^A-Za-z0-9]/.test(pw)) strength++;

let bar = document.getElementById("strengthBar");

if(strength <= 1){
  bar.style.width = "25%";
  bar.style.background = "red";
}
else if(strength == 2){
  bar.style.width = "50%";
  bar.style.background = "orange";
}
else if(strength == 3){
  bar.style.width = "75%";
  bar.style.background = "yellow";
}
else{
  bar.style.width = "100%";
  bar.style.background = "green";
}
}
</script>

</body>
</html>
